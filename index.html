<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Gastos 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f7f9fc; font-family: system-ui, sans-serif; padding-bottom: 80px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <div id="view-registro" class="tab-content active space-y-5">
        <header class="bg-gradient-to-r from-slate-800 to-slate-950 text-white rounded-2xl p-5 shadow-md text-center">
            <p class="text-xs uppercase tracking-widest opacity-70">Nuevo Registro</p>
            <h1 class="text-2xl font-bold mt-1">Gasto Diario</h1>
        </header>

        <section class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
            <form id="expense-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Categoría</label>
                    <select id="category" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-gray-700 focus:outline-none focus:ring-2 focus:ring-slate-500 appearance-none" required>
                        <option value="" disabled selected>Selecciona una categoría</option>
                        <option value="Agua">💧 Agua</option>
                        <option value="Saldo">📱 Saldo</option>
                        <option value="Seguro de auto">🛡️ Seguro de Auto</option>
                        <option value="Pago de auto">🚗 Pago de Auto</option>
                        <option value="Gasolina">⛽ Gasolina</option>
                        <option value="Pago Silvia Auto">🤝 Pago Silvia Auto</option>
                        <option value="Gym">🏋️‍♂️ Gym</option>
                        <option value="Internet">🌐 Internet</option>
                        <option value="Crédito HSBC">💳 Crédito HSBC</option>
                        <option value="Crédito BBVA">💳 Crédito BBVA</option>
                        <option value="Personal">🛍️ Personal</option>
                        <option value="DAFI">🎓 DAFI</option>
                        <option value="Liverpool">🏢 Liverpool</option>
                        <option value="Oralia">🌸 Oralia</option>
                        <option value="Otros">📦 Otros</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Monto ($)</label>
                    <input type="number" step="0.01" id="amount" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-gray-800 font-medium text-lg focus:outline-none focus:ring-2 focus:ring-slate-500" placeholder="0.00" required>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Nota / Descripción (Opcional)</label>
                    <input type="text" id="note" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-gray-800 focus:outline-none focus:ring-2 focus:ring-slate-500" placeholder="Ej. Despensa Ley, Salida al cine">
                </div>

                <button type="submit" id="btn-submit" class="w-full bg-slate-900 hover:bg-black text-white font-semibold py-4 rounded-xl shadow-sm transition-all flex justify-center items-center">
                    <span>Registrar Gasto</span>
                </button>
            </form>
        </section>
        <div id="status-message" class="hidden p-4 rounded-xl text-center text-sm font-medium"></div>
    </div>

    <div id="view-reporte" class="tab-content space-y-5">
        <header class="bg-gradient-to-r from-slate-800 to-slate-950 text-white rounded-2xl p-5 shadow-md text-center">
            <p class="text-xs uppercase tracking-widest opacity-70">Resumen Mensual</p>
            <h1 id="current-month-title" class="text-2xl font-bold mt-1">Gastos del Mes</h1>
        </header>

        <section class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <span class="text-xs font-bold text-gray-400 uppercase">Categoría</span>
                <span class="text-xs font-bold text-gray-400 uppercase">Total Acumulado</span>
            </div>
            <div id="report-list" class="space-y-3 divide-y divide-gray-100">
                <p class="text-gray-400 text-sm text-center py-4">Cargando datos desde Excel...</p>
            </div>
        </section>
    </div>

    <div id="view-graficas" class="tab-content space-y-5">
        <header class="bg-gradient-to-r from-slate-800 to-slate-950 text-white rounded-2xl p-5 shadow-md text-center">
            <p class="text-xs uppercase tracking-widest opacity-70">Análisis Visual</p>
            <h1 class="text-2xl font-bold mt-1">Distribución</h1>
        </header>

        <section class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex flex-col items-center justify-center">
            <div class="w-full relative h-64 flex items-center justify-center">
                <canvas id="chartGastos"></canvas>
                <p id="chart-loading" class="text-gray-400 text-sm absolute">Cargando gráfica...</p>
            </div>
        </section>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-xl px-6 py-2 flex justify-around max-w-md mx-auto z-50">
        <button onclick="switchTab('registro')" id="nav-registro" class="flex flex-col items-center space-y-1 text-slate-900 font-semibold">
            <span class="text-xl">📝</span>
            <span class="text-xs">Registrar</span>
        </button>
        <button onclick="switchTab('reporte')" id="nav-reporte" class="flex flex-col items-center space-y-1 text-gray-400 font-medium">
            <span class="text-xl">📊</span>
            <span class="text-xs">Reporte</span>
        </button>
        <button onclick="switchTab('graficas')" id="nav-graficas" class="flex flex-col items-center space-y-1 text-gray-400 font-medium">
            <span class="text-xl">🥧</span>
            <span class="text-xs">Gráfica</span>
        </button>
    </nav>

    <script>
        // Tu URL exacta integrada
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxiHd7wBAHwCByDC-S5nWDO4SVs_lCfCfZVt4ZCsBElL2n_ksmvNC7_l1nEMshgzbun/exec";
        let miGrafica = null;
        let datosLocales = null;

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${tabName}`).classList.add('active');
            
            const tabs = ['registro', 'reporte', 'graficas'];
            tabs.forEach(t => {
                const btn = document.getElementById(`nav-${t}`);
                if(t === tabName) {
                    btn.className = "flex flex-col items-center space-y-1 text-slate-900 font-semibold";
                } else {
                    btn.className = "flex flex-col items-center space-y-1 text-gray-400 font-medium";
                }
            });

            if ((tabName === 'reporte' || tabName === 'graficas') && !datosLocales) {
                cargarDatosExcel();
            }
        }

        // Formulario POST
        document.getElementById('expense-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btn-submit');
            const statusMsg = document.getElementById('status-message');
            
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Enviando...";
            statusMsg.classList.add('hidden');

            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    categoria: document.getElementById('category').value, 
                    monto: parseFloat(document.getElementById('amount').value),
                    nota: document.getElementById('note').value.trim()
                })
            })
            .then(() => {
                statusMsg.className = "mt-4 p-4 rounded-xl text-center text-sm font-medium bg-emerald-50 text-emerald-700 block";
                statusMsg.innerText = `¡Éxito! Gasto registrado correctamente.`;
                document.getElementById('expense-form').reset();
                datosLocales = null; 
            })
            .catch(error => {
                statusMsg.className = "mt-4 p-4 rounded-xl text-center text-sm font-medium bg-rose-50 text-rose-700 block";
                statusMsg.innerText = "Error al registrar. Intenta de nuevo.";
            })
            .finally(() => {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Registrar Gasto";
            });
        });

        // Cargar datos actuales corregido para evitar bloqueo CORS de Google
        function cargarDatosExcel() {
            // El truco definitivo: Añadimos un parámetro aleatorio para engañar el bloqueo del navegador
            const urlConFiltro = WEB_APP_URL + "?nocache=" + new Date().getTime();
            
            fetch(urlConFiltro)
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    console.error("Error devuelto por script:", data.error);
                    document.getElementById('report-list').innerHTML = `<p class="text-rose-500 text-center text-sm">Error en la estructura de la hoja.</p>`;
                    return;
                }
                datosLocales = data;
                document.getElementById('current-month-title').innerText = `Gastos de ${data.mes}`;
                renderizarListaReporte(data.gastos);
                renderizarGrafica(data.gastos);
            })
            .catch(err => {
                console.error("Error cargando datos:", err);
                document.getElementById('report-list').innerHTML = `<p class="text-rose-500 text-center text-sm">Error de conexión. Revisa los permisos de Apps Script.</p>`;
            });
        }

        function renderizarListaReporte(gastos) {
            const container = document.getElementById('report-list');
            container.innerHTML = "";
            
            if(!gastos || gastos.length === 0) {
                container.innerHTML = `<p class="text-gray-400 text-sm text-center py-4">No hay gastos en este mes.</p>`;
                return;
            }

            gastos.forEach(g => {
                const fila = document.createElement('div');
                fila.className = "flex justify-between items-center py-3 text-sm";
                fila.innerHTML = `
                    <span class="font-medium text-gray-700">${g.categoria}</span>
                    <span class="font-bold text-slate-900">$${g.total.toFixed(2)}</span>
                `;
                container.appendChild(fila);
            });
        }

        function renderizarGrafica(gastos) {
            const loadingText = document.getElementById('chart-loading');
            if (loadingText) loadingText.style.display = 'none';

            if(!gastos) return;
            const gastosActivos = gastos.filter(g => g.total > 0);
            
            const etiquetas = gastosActivos.map(g => g.categoria);
            const montos = gastosActivos.map(g => g.total);

            const ctx = document.getElementById('chartGastos').getContext('2d');
            
            if(miGrafica) {
                miGrafica.destroy();
            }

            miGrafica = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: etiquetas,
                    datasets: [{
                        data: montos,
                        backgroundColor: [
                            '#475569', '#1e293b', '#0f172a', '#334155', '#64748b',
                            '#0284c7', '#0369a1', '#0f766e', '#14b8a6', '#0d9488',
                            '#10b981', '#059669', '#b45309', '#d97706', '#e11d48'
                        ],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { boxWidth: 12, font: { size: 11 } }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
